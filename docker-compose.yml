services:
  kai:
    build:
      context: .
      args:
        INSTALL_OPTIONAL: "1"
    container_name: kommu_chatbot
    restart: unless-stopped
    ports:
      - "6090:8000"   
    env_file: .env
    volumes:
      - ./data:/data
      - ./media:/app/media
      - ./logs:/app/logs
      - ./agent_workspace:/app/agent_workspace
      # Service account JSON path from GOOGLE_SHEETS_CREDENTIALS_JSON (e.g. ./secrets/google_service_account.json)
      - ./secrets:/app/secrets:ro
    environment:
      - TZ=Asia/Kuala_Lumpur
      - TZ_REGION=Asia/Kuala_Lumpur
      - AGENT_WORKSPACE=/app/agent_workspace
      - SESSION_DB_PATH=/data/sessions.db
      - DB_PATH=/data/sessions.db

