services:
  kai:
    build:
      context: .
    container_name: kai
    restart: unless-stopped
    ports:
      - "6090:8000"
    env_file:
      - ${KAI_ENV_FILE:-${KAI_HOME:-~/.kai}/.env}
    volumes:
      - ${KAI_HOME:-~/.kai}:/kai-home
    environment:
      - TZ=Asia/Kuala_Lumpur
      - TZ_REGION=Asia/Kuala_Lumpur
      - KAI_HOME=/kai-home
      - KAI_ENV_FILE=/kai-home/.env
      - SESSION_DB_PATH=/kai-home/data/sessions.db
      - DB_PATH=/kai-home/data/sessions.db
