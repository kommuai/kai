# Kommu production profile — engine builtins are generic; tenant config lives here.

active_profile: kommu

profiles:
  minimal:
    - search_faq
    - search_session_memory
    - escalate_to_human
  kommu:
    - search_faq
    - search_session_memory
    - search_web
    - search_kommu_support
    - search_bukapilot
    - read_bukapilot_file
    - lookup_warranty
    - lookup_backlog
    - log_backlog
    - escalate_to_human
    - create_visitor_pass

profile_overrides:
  search_kommu_support:
    builtin: search_official_site
    params:
      official_url: https://kommu.ai/support/
      vehicles_json_url: https://raw.githubusercontent.com/kommuai/bukapilot/snapshot/selfdrive/car/supported_vehicle.json
  search_bukapilot:
    builtin: search_github_repo
    params:
      repo: kommuai/bukapilot
      branch: release_ka2
  read_bukapilot_file:
    builtin: read_github_file
    params:
      repo: kommuai/bukapilot
      branch: release_ka2
  lookup_warranty:
    builtin: lookup_sheet_record
  lookup_backlog:
    builtin: lookup_sheet_backlog
  log_backlog:
    builtin: log_sheet_backlog
    params:
      summarize_system_prompt: >-
        You are a technical documentation writer for KommuAssist (KA2).
        Return ONLY JSON with keys problem_description and reproduction_steps.
  create_visitor_pass:
    plugin: smartserva_visitor_pass
    description: Create building visitor pass and return link (plain URL only).

tools: []
