version: "2"

tenant:
  id: kommu-support
  display_name: Kai
  default_lang: en
  timezone: Asia/Kuala_Lumpur

paths:
  system_prompt: 01_core/system_prompt.md
  knowledge_primary: 02_knowledge/faq/master_faq.md
  knowledge_compiled_dir: compiled
  chat_copy: 05_copy/chat_copy.yaml
  channels_handover: 04_channels/handover.yaml
  settings: settings.yaml
  tools: 03_tools/tools.yaml

knowledge:
  format: master_faq_v1
  compile: kb_chunks.jsonl
  inject_mode: full_context
  faq_preamble: |
    ## Authoritative FAQ (master_faq.md)

    This is the only source of truth for Kommu product, pricing, installation,
    warranty, office, and policy answers. Use tools when this FAQ does not cover the request.

tools:
  enabled: []

channels:
  whatsapp:
    max_reply_chars: 4096

sop_sync:
  enabled: true

session_store:
  backend: sqlite
  path: data/sessions.db
