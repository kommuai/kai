version: '2'
tenant:
  id: generic-support
  display_name: Support Bot
  default_lang: en
  timezone: UTC
paths:
  system_prompt: system_prompt.md
  knowledge_primary: knowledge/master_faq.md
  knowledge_compiled_dir: compiled
  knowledge_learnt_faq: knowledge/learnt_faq.md
  knowledge_learn_queue: knowledge/learn_queue
  tools_plugins_dir: tools/plugins
knowledge:
  format: master_faq_v1
  compile: kb_chunks.jsonl
  inject_mode: retrieval_first
tools:
  enabled: []
channels:
  office:
    timezone: UTC
    weekdays: [0, 1, 2, 3, 4]
    start_hour: 9
    end_hour: 17
  handover:
    live_agent_keywords: [LA]
    resume_keywords: [resume]
  frozen:
    idle_hours: 24
  media:
    blocked_types: [image, video]
    storage_dir: data/media
    max_bytes: 10485760
    stt:
      enabled: true
      provider: faster_whisper
      model: small
      min_confidence: 0.5
      languages: [en, ms]
    vision:
      enabled: false
      provider: dashscope_qwen_vl
      model: qwen-vl-max
      min_confidence: 0.7
    enrich:
      voice_template_en: "[Voice message]: {transcript}"
      voice_template_bm: "[Mesej suara]: {transcript}"
      voice_fallback_en: I couldn't make out your voice message. Please type your question.
      voice_fallback_bm: Saya tidak dapat dengar mesej suara anda. Sila taip soalan anda.
      image_template_en: "[Image]: {extracted}"
      image_template_bm: "[Imej]: {extracted}"
      image_fallback_en: I couldn't read that image clearly. Please describe the issue in text.
      image_fallback_bm: Saya tidak dapat baca imej itu dengan jelas. Sila terangkan isu anda.
  fallbacks:
    no_signal_en: What do you need help with?
    post_tool_en: Can you share more detail about your question?
  whatsapp:
    max_reply_chars: 4096
sop_sync:
  enabled: false
session_store:
  backend: sqlite
  path: data/sessions.db
session:
  idle_hours: 24
  max_history_messages: 100
agent:
  max_steps: 8
  footer_history_threshold: 10
compile:
  extra_artifacts: false
training:
  agent_job: customer_support
  current_level: 0
  current_level_title: ""
  current_level_emoji: ""
  earned_badges: []
  last_assessed_at: null
logging:
  metrics_file: data/turn_metrics.jsonl
eval:
  abstain_threshold: 0.4
  verifier_mode: rules       # rules | llm
  verifier_on_fail: flag     # flag | abstain
  verifier_min_score: 0.0
  max_corpus_age_days: 30
  contradiction_token_overlap: 0.3
  # gates checked by: python -m shadou.tools.eval_run --eval-file PATH
  # gates: {}
hitl:
  enabled: true
  confidence_threshold: 0.6
  flag_verification_fail: true
  flag_abstain: true
  flag_escalate: true
  impact_keywords:
  - refund
  - payment
  - warranty
  - price
  - pricing
  - contract
  - policy
  - security
  - cancel
  - legal
copy:
  abstain_en: "I don't have enough information to answer that reliably. Type LA for a live agent."
  abstain_bm: "Saya tidak mempunyai maklumat yang cukup. Taip LA untuk ejen."
faq_learn:
  use_queue: true
  legacy_append: false
copy:
  keywords:
    live_agent: [LA]
  footer:
    en: |


      For a live agent, type LA
    bm: |


      Taip LA untuk ejen
    history_threshold: 10
  after_hours:
    en: |


      PS: We are outside office hours.
    bm: |


      PS: Di luar waktu pejabat.
  handover:
    live_agent_en: A live agent will assist you soon. Type *resume* to continue with the bot.
    live_agent_bm: Ejen akan membantu anda. Taip *resume* untuk teruskan.
  resume:
    en: Bot resumed. How can I help?
    bm: Bot disambung semula.
  media_guard:
    en: Please describe your issue in text; media is not supported yet.
tools_profile:
  active_profile: minimal
  profiles:
    minimal:
    - search_faq
    - search_session_memory
    - escalate_to_human
  profile_overrides: {}
  tools: []
contexts: []
