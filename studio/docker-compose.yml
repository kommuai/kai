# Shadou Studio — separate stack from the Shadou engine (../docker-compose.yml).
# Launch:  cd studio && docker compose up -d --build

services:
  studio-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: shadou-studio-api
    restart: unless-stopped
    ports:
      - "${STUDIO_API_PORT:-8080}:8080"
    env_file:
      - ${STUDIO_ENV_FILE:-./backend/.env}
    environment:
      SHADOU_REPO: ${SHADOU_REPO:-/shadou-engine}
      SHADOU_TENANTS_ROOT: /tenants
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      # .. = monorepo root (shadou/); ../.. = parent of repo (often ~/workspace with shadou-tenant-* dirs)
      - ${SHADOU_REPO_HOST:-..}:/shadou-engine:ro
      - ${SHADOU_TENANTS_ROOT_HOST:-../..}:/tenants
      - studio-admin-data:/app/data

  studio-web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: shadou-studio-web
    restart: unless-stopped
    ports:
      - "${STUDIO_WEB_PORT:-5173}:80"
    depends_on:
      - studio-api

volumes:
  studio-admin-data:
