# Isolated staging for refactor branch (does not replace production kommu_chatbot).
# Usage: docker compose -f docker-compose.staging.yml up -d --build
services:
  kai-staging:
    build:
      context: .
    container_name: kommu_chatbot_staging
    restart: unless-stopped
    ports:
      - "6091:8000"
    env_file:
      - ../kai-main/.env
    volumes:
      - ~/.kai:/kai-home
      - ../kai-main/secrets:/app/secrets:ro
      - ~/.kai/.env:/kai-home/.env:ro
    environment:
      - TZ=Asia/Kuala_Lumpur
      - TZ_REGION=Asia/Kuala_Lumpur
      - KAI_HOME=/kai-home
      - KAI_ENV_FILE=/kai-home/.env
      - SESSION_DB_PATH=/kai-home/data/sessions.db
      - DB_PATH=/kai-home/data/sessions.db
      - GOOGLE_SHEETS_CREDENTIALS_JSON=/app/secrets/google_service_account.json
