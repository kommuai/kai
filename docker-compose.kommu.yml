# Kommu production overlay for refactor branch (replaces legacy docker-compose.yml layout).
# Usage: docker compose -f docker-compose.kommu.yml up -d --build
services:
  kai:
    build:
      context: .
    container_name: kommu_chatbot
    restart: unless-stopped
    ports:
      - "6090:8000"
    env_file:
      - .env
    volumes:
      - ~/.kai:/kai-home
      - ./media:/app/media
      - ./logs:/app/logs
      - ./secrets:/app/secrets:ro
      - ~/.kai/.env:/kai-home/.env:ro
    environment:
      - TZ=Asia/Kuala_Lumpur
      - TZ_REGION=Asia/Kuala_Lumpur
      - KAI_HOME=/kai-home
      - KAI_ENV_FILE=/kai-home/.env
      - SESSION_DB_PATH=/kai-home/data/sessions.db
      - DB_PATH=/kai-home/data/sessions.db
      - GOOGLE_SHEETS_CREDENTIALS_JSON=/app/secrets/google_service_account.json
