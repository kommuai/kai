services:
  shadou:
    build:
      context: .
    container_name: shadou
    restart: unless-stopped
    ports:
      - "6090:8000"
    env_file:
      - ${SHADOU_ENV_FILE:-${SHADOU_HOME:-~/.shadou}/.env}
    volumes:
      - ${SHADOU_HOME:-~/.shadou}:/shadou-home
    environment:
      - TZ=Asia/Kuala_Lumpur
      - TZ_REGION=Asia/Kuala_Lumpur
      - SHADOU_HOME=/shadou-home
      - SHADOU_ENV_FILE=/shadou-home/.env
      - SESSION_DB_PATH=/shadou-home/data/sessions.db
      - DB_PATH=/shadou-home/data/sessions.db
